name: "Cheatsheet weekly recommender"

# Scans the user's past-7-day GitHub activity, finds newly-adopted frameworks
# not yet covered, and opens ONE issue with a top-3 table asking which to add (I-2).

on:
  schedule:
    - cron: "17 4 * * 1"   # 04:17 UTC every Monday
  workflow_dispatch: {}     # always allow manual runs for testing

permissions:                # least privilege: this job only opens an issue
  contents: read            # read the checked-out repo (existing cheatsheets/index)
  issues: write
  id-token: write           # OIDC — required by claude-code-action

concurrency:
  group: "cheatsheet-recommend"
  cancel-in-progress: false

jobs:
  recommend:
    runs-on: ubuntu-latest
    timeout-minutes: 30       # bound the run (tunable)
    env:
      GH_TOKEN: ${{ github.token }}                  # issue writes target THIS repo
      GH_SCAN_TOKEN: ${{ secrets.GH_SCAN_TOKEN }}    # read-only PAT for cross-repo activity scan
    steps:
      - name: Preflight — require the read-only scan token
        run: |
          if [ -z "${GH_SCAN_TOKEN}" ]; then
            echo "::error::GH_SCAN_TOKEN secret is not set. Add a read-only fine-grained PAT (contents+metadata, all repos) named GH_SCAN_TOKEN."
            exit 1
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6 — bump the SHA deliberately

      - uses: anthropics/claude-code-action@41ea7642c1436fa0ee57aae58347904b71a5af27  # v1 — bump the SHA deliberately
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          claude_args: |
            --max-turns 60
            --allowedTools "Read,Glob,Grep,WebSearch,WebFetch,Bash(date:*),Bash(gh api:*),Bash(gh search code:*),Bash(gh search commits:*),Bash(gh repo list:*),Bash(gh repo view:*),Bash(gh issue list:*),Bash(gh issue create:*)"
          prompt: |
            You are the weekly gap-recommender for this cheatsheet repo (intent I-2).

            ## Orientation (read first)
            - Read `CLAUDE.md`, `specs/CONSTITUTION.md`, and `.claude/skills/cheatsheet/SKILL.md`.
            - List what already exists: every `cheatsheets/*.md` and `index.md` — these define
              what is ALREADY covered.
            - Resolve the login: `gh api user --jq .login`. Compute the window:
              `date -u -d '7 days ago' +%Y-%m-%d` (start) and `date -u +%Y-%m-%d` (today).

            ## Two-token rule (NON-NEGOTIABLE security boundary)
            - CROSS-REPO READS: ALWAYS prefix with the read-only token, e.g.
              `GH_TOKEN=$GH_SCAN_TOKEN gh search commits --author <login> --committer-date '>=<start>' --json repository,sha,commit`.
            - THE ISSUE WRITE (`gh issue list`/`gh issue create`) in THIS repo: plain `gh` (default token).
            - NEVER read other repos with the default token; NEVER write with the scan token.
            - You have NO write access to repo contents and CANNOT open PRs — your only output is one issue.

            ## Privacy (Constitution P-7) — applies to the entire issue (title + body)
            - Resolve each touched repo's visibility before citing it.
            - NEVER name/slug/URL a PRIVATE repo or quote its code in the issue; generalize.
              Public repos may be cited as evidence.

            ## Task — recommend the top 3 gaps in ONE issue, ask the user to choose
            1. From the past-7-day commits/activity, infer the libraries, frameworks, and tools the
               user newly adopted or worked heavily in this week.
            2. Keep only topics that are (a) genuinely cheatsheet-worthy and (b) NOT already a
               `cheatsheets/*.md`. RANK them by value and take AT MOST the TOP 3. Drop the rest.
            3. Dedup: `gh issue list --state open --search "Cheatsheet recommendations"`. If an open
               recommendations issue already lists the same top topics, SKIP (do not open a duplicate).
            4. If at least one topic qualifies, open exactly ONE issue with `gh issue create`:
               - Title: `Cheatsheet recommendations — week of <YYYY-MM-DD>`
               - Body: a short intro, then a markdown table, then a one-line ask. Use this shape:

                 ```markdown
                 Based on your GitHub activity from <start> to <today>, here are the top cheatsheet
                 candidates not yet covered. Comment with the number(s) you want me to add.

                 | # | Topic (use case) | Target | Why now (your recent activity) | Evidence | Generate with |
                 |---|---|---|---|---|---|
                 | 1 | <use case> | `<target>` | <one line> | `owner/repo` (public; private generalized) | `/cheatsheet <use case> --target <target>` |
                 | 2 | ... | ... | ... | ... | ... |
                 | 3 | ... | ... | ... | ... | ... |

                 Reply with the numbers to add (e.g. "1 and 3"); I'll generate those cheatsheets.
                 ```

            ## Finish
            - If no topic qualifies (or a duplicate issue already exists), open NO issue and print
              "no new cheatsheet topics this week".
            - Report: window scanned, topics considered, and the issue number opened (or none).
