name: "Cheatsheet monthly refresh"

# Re-mines the user's repos, regenerates every cheatsheet against current docs,
# and opens ONE pull request per materially-changed cheatsheet (I-2).

on:
  schedule:
    - cron: "17 4 1 * *"   # 04:17 UTC on the 1st of each month
  workflow_dispatch: {}     # always allow manual runs for testing

permissions:                # least privilege: open PRs in THIS repo only
  contents: write
  pull-requests: write
  id-token: write           # OIDC — required by claude-code-action

concurrency:
  group: "cheatsheet-refresh"
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90       # bound a long multi-sheet run (tunable)
    env:
      # gh writes (PRs/commits) target THIS repo via the default token.
      GH_TOKEN: ${{ github.token }}
      # Read-only PAT (contents+metadata, all repos incl. private) for cross-repo mining.
      GH_SCAN_TOKEN: ${{ secrets.GH_SCAN_TOKEN }}
    steps:
      - name: Preflight — require the read-only scan token
        run: |
          if [ -z "${GH_SCAN_TOKEN}" ]; then
            echo "::error::GH_SCAN_TOKEN secret is not set. Add a read-only fine-grained PAT (contents+metadata, all repos) named GH_SCAN_TOKEN."
            exit 1
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6 — bump the SHA deliberately
        with:
          fetch-depth: 0      # full history so per-sheet branches fork cleanly off main

      - uses: anthropics/claude-code-action@41ea7642c1436fa0ee57aae58347904b71a5af27  # v1 — bump the SHA deliberately
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          claude_args: |
            --max-turns 150
            --allowedTools "Read,Glob,Grep,Edit,Write,WebSearch,WebFetch,Bash(date:*),Bash(gh api:*),Bash(gh search code:*),Bash(gh search commits:*),Bash(gh repo list:*),Bash(gh repo view:*),Bash(gh pr list:*),Bash(gh pr create:*),Bash(git status:*),Bash(git diff:*),Bash(git switch:*),Bash(git checkout:*),Bash(git restore:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(uv run:*)"
          prompt: |
            You are the monthly self-maintenance agent for this cheatsheet repo (intent I-2).

            ## Orientation (read first)
            - Read `CLAUDE.md`, `specs/CONSTITUTION.md`, and `.claude/skills/cheatsheet/SKILL.md`.
              The SKILL.md is your generation procedure — follow its mining → grounding →
              classification → authoring workflow for each sheet.
            - Resolve the GitHub login once: `gh api user --jq .login` (uses the scan token).
            - Today's date and the base branch: capture with `date -u +%Y-%m-%d` and you start on the
              repo's default branch.

            ## Two-token rule (NON-NEGOTIABLE security boundary)
            - CROSS-REPO READS (mining other repos): ALWAYS prefix with the read-only token, e.g.
              `GH_TOKEN=$GH_SCAN_TOKEN gh search code ...`, `GH_TOKEN=$GH_SCAN_TOKEN gh api repos/<o>/<r>/contents/<p> ...`.
            - WRITES (branch push, `gh pr create`) in THIS repo: use plain `gh`/`git` (default token).
            - NEVER use the default token to read other repos; NEVER use the scan token to write.

            ## Privacy (Constitution P-7) — applies to every PR title, body, and file
            - For each mined repo resolve visibility: `GH_TOKEN=$GH_SCAN_TOKEN gh repo view <login>/<repo> --json visibility -q .visibility`.
            - NEVER put a PRIVATE repo's name/slug/URL or verbatim code in any committed file or PR text.
              Convey private-sourced patterns generalized. Public repos may be cited.

            ## Task — refresh each cheatsheet, one PR per materially-changed sheet
            For every file in `cheatsheets/*.md`:
            1. Recover its inputs from the H1 `# <use case> with <target>` and the italic source line.
            2. Re-run the SKILL.md workflow against TODAY's repos (cross-repo reads) and TODAY's docs
               (context7 if available, else WebSearch + WebFetch of official docs/changelog). Produce the
               updated sheet content in the same required structure.
            3. Compare to the committed file. A change is **material** only if the Reference snippet,
               Typical usage patterns, Learnings, or Agent rules changed. A diff limited to the
               `_Grounded in ... as of <date>_` line is NOT material — skip it, open no PR.
            4. If material:
               - Before doing anything, check for an existing open PR: `gh pr list --state open --search "refresh <slug>" --json headRefName`. If one exists for this sheet's branch, SKIP (no duplicate).
               - `git switch -c auto/refresh/<slug>-<YYYY-MM>` off the default branch.
               - Write the updated `cheatsheets/<slug>.md`. Run `uv run scripts/register_cheatsheet.py`
                 and stage `index.md` ONLY if it actually changed (it only changes if a title changed).
               - Commit, `git push -u origin` the branch, then `gh pr create` titled
                 `chore(cheatsheet): refresh <slug> (<Month YYYY>)` with a body that SUMMARIZES the delta
                 (what idiom/learning changed and why) — not a raw diff.
               - `git switch <default-branch>` and `git restore .` before the next sheet so each PR
                 contains only its own change.

            ## Finish
            - If NO sheet changed materially, open zero PRs and print a one-line "nothing to refresh".
            - Report: sheets checked, PRs opened (with branch names), and any skipped duplicates.
