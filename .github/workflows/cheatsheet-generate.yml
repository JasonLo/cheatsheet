name: "Cheatsheet generate from selection"

# Closes the loop end-to-end in the GitHub web UI (I-2 O-6): when the repo OWNER
# comments a topic selection (e.g. "1 and 3") on an open cheatsheet-recommendations
# issue, generate each chosen sheet via the I-1 `cheatsheet` skill and open ONE
# human-reviewed PR per selected topic. No local step, no auto-merge.
#
# CAVEAT — issue_comment workflows ALWAYS run the copy on the DEFAULT BRANCH (main),
# never a feature branch. So:
#   1. This file only takes effect once merged to main.
#   2. The issue_comment path cannot be tested from a branch — use the
#      workflow_dispatch path (issue_number + selection inputs) for pre-merge testing.

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Recommendations issue number to read the table from"
        required: true
      selection:
        description: 'Topic numbers to generate, e.g. "1 and 3"'
        required: true

permissions:                # least privilege: open PRs in THIS repo only (no issue writes)
  contents: write
  pull-requests: write
  id-token: write           # OIDC — required by claude-code-action

concurrency:
  # Per-issue group: selections on different issues run in parallel; repeated
  # comments on the SAME issue serialize so two runs can't race to create a branch.
  group: "cheatsheet-generate-${{ github.event.issue.number || inputs.issue_number }}"
  cancel-in-progress: false

jobs:
  generate:
    # issue_comment path: owner-only, open recommendations issue, not a PR comment.
    # workflow_dispatch path always runs (manual testing).
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request == null &&
       github.event.issue.state == 'open' &&
       github.event.comment.user.login == github.repository_owner &&
       startsWith(github.event.issue.title, 'Cheatsheet recommendations'))
    runs-on: ubuntu-latest
    timeout-minutes: 60       # up to ~3 sheets generated from scratch (tunable)
    env:
      # gh writes (branch push, PRs) target THIS repo via the default token.
      GH_TOKEN: ${{ github.token }}
      # Read-only PAT (contents+metadata, all repos incl. private) for cross-repo mining.
      GH_SCAN_TOKEN: ${{ secrets.GH_SCAN_TOKEN }}
      # Untrusted event/input data passed as env (NEVER interpolated into the prompt).
      ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
      SELECTION_COMMENT: ${{ github.event.comment.body }}
      DISPATCH_SELECTION: ${{ inputs.selection }}
    steps:
      - name: Preflight — require the read-only scan token
        run: |
          if [ -z "${GH_SCAN_TOKEN}" ]; then
            echo "::error::GH_SCAN_TOKEN secret is not set. Add a read-only fine-grained PAT (contents+metadata, all repos) named GH_SCAN_TOKEN."
            exit 1
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6 — bump the SHA deliberately
        with:
          fetch-depth: 0      # full history so per-topic branches fork cleanly off main

      - uses: anthropics/claude-code-action@41ea7642c1436fa0ee57aae58347904b71a5af27  # v1 — bump the SHA deliberately
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          claude_args: |
            --max-turns 120
            --allowedTools "Read,Glob,Grep,Edit,Write,WebSearch,WebFetch,Bash(date:*),Bash(gh api:*),Bash(gh search code:*),Bash(gh search commits:*),Bash(gh repo list:*),Bash(gh repo view:*),Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh pr list:*),Bash(gh pr create:*),Bash(git status:*),Bash(git diff:*),Bash(git switch:*),Bash(git checkout:*),Bash(git restore:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(uv run:*)"
          prompt: |
            You are the selection-triggered generate agent for this cheatsheet repo (intent I-2, outcome O-6).
            A user picked one or more recommended topics by commenting on a cheatsheet-recommendations
            issue. Your job: generate each chosen sheet and open ONE pull request per topic. The whole
            loop must complete in the GitHub web UI — you NEVER merge, approve, or close anything.

            ## Orientation (read first)
            - Read `CLAUDE.md`, `specs/CONSTITUTION.md`, and `.claude/skills/cheatsheet/SKILL.md`.
              The SKILL.md is your generation procedure — follow its mining → grounding →
              classification → authoring workflow for each selected sheet, including its slug rule
              and required sheet structure.
            - Resolve the GitHub login once: `gh api user --jq .login` (uses the scan token below).
            - Capture today's date: `date -u +%Y-%m-%d`. You start on the repo's default branch.

            ## Resolve the selection (do this before anything else)
            - The recommendations issue number is in `$ISSUE_NUMBER`. Read it (default token, THIS repo):
              `gh issue view "$ISSUE_NUMBER" --json title,body,state`.
            - CONFIRM the issue state is OPEN and its title begins with `Cheatsheet recommendations`.
              If either check fails, STOP immediately and open no PR.
            - The issue body contains a markdown table whose columns are `| # | Topic (use case) | Target | ... |`.
            - The selected numbers come from `$SELECTION_COMMENT` (when triggered by a comment) or
              `$DISPATCH_SELECTION` (when run manually). Parse whichever is non-empty for integers;
              accept forms like "1 and 3", "1,3", "1 & 3", "1 3".
            - For each selected number, read THAT table row and extract the Topic (use case, column 2)
              and Target (column 3, the backtick-wrapped value). These are the inputs to the SKILL.md
              generation procedure. Skip any selected number that has no matching row and report it.
              NEVER invent a topic that is not in the table.

            ## Two-token rule (NON-NEGOTIABLE security boundary)
            - CROSS-REPO READS (mining other repos inside the skill): ALWAYS prefix with the read-only
              token, e.g. `GH_TOKEN=$GH_SCAN_TOKEN gh search code ...`,
              `GH_TOKEN=$GH_SCAN_TOKEN gh api repos/<o>/<r>/contents/<p> ...`.
            - READING THE ISSUE and WRITES (branch push, `gh pr create`) in THIS repo: use plain
              `gh`/`git` (default token).
            - NEVER use the default token to read other repos; NEVER use the scan token to write.
            - You have NO merge/approve/close ability and MUST NOT attempt one — your only output is PRs.

            ## Privacy (Constitution P-7) — applies to every PR title, body, and file
            - For each mined repo resolve visibility: `GH_TOKEN=$GH_SCAN_TOKEN gh repo view <login>/<repo> --json visibility -q .visibility`.
            - NEVER put a PRIVATE repo's name/slug/URL or verbatim code in any committed file or PR text.
              Convey private-sourced patterns generalized. Public repos may be cited.

            ## Task — generate each selected topic, one PR per topic
            For each resolved `(use case, target)`:
            1. Compute the slug exactly as SKILL.md defines it. Guard against duplicates BEFORE writing:
               - `gh pr list --state open --search "generate <slug>" --json headRefName` — if an open PR
                 already targets this topic's branch, SKIP it (no duplicate).
               - If `cheatsheets/<slug>.md` already exists on the default branch, SKIP and report
                 "already covered" — refreshing existing sheets is the monthly job's responsibility,
                 not this one.
            2. `git switch -c auto/generate/<slug>` off the default branch.
            3. Run the SKILL.md workflow against TODAY's repos (cross-repo reads) and TODAY's docs
               (context7 if available, else WebSearch + WebFetch of official docs/changelog). Write
               `cheatsheets/<slug>.md` in the full required structure.
            4. Run `uv run scripts/register_cheatsheet.py` and stage `index.md` (a new sheet always
               adds an index row, so index.md will always change here).
            5. Commit, `git push -u origin auto/generate/<slug>`, then `gh pr create` titled
               `feat(cheatsheet): add <slug>` with a body that SUMMARIZES what the sheet covers (use
               case + target), the doc source it was grounded in, and a `Closes selection from #$ISSUE_NUMBER`
               line — NOT a raw diff, and NEVER any private repo identifier/content.
            6. `git switch <default-branch>` and `git restore .` before the next topic so each PR
               contains only its own sheet + its own index.md row.

            ## Finish
            - If NO topic resolved (all skipped/duplicate/unmatched), open zero PRs and print a one-line
              "no cheatsheets generated" with the reason.
            - Report: the issue read, the selection parsed, topics resolved, PRs opened (with branch
              names), and any skipped/duplicate/unmatched numbers.
